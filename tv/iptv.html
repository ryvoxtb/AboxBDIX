<!DOCTYPE html>
<html lang="bn">
<head>
    <script>
        (function() {    
            const currentToken = sessionStorage.getItem('allowed_entry');
            const expectedPrefix = btoa("RYUOX_SECURE_ENTRY_");
            
            let isValid = false;
            if (currentToken) {
                try {
                    const decoded = atob(currentToken);
                    if (decoded.startsWith("RYUOX_SECURE_ENTRY_")) {
                        isValid = true;
                    }
                } catch(e) {
                    isValid = false;
                }
            }

            if (!isValid) {           
                window.location.href = '../index.html'; 
            }
        })();
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABOX BDIX - Professional IPTV Player</title>
    <link class="favicon" rel="icon" type="image/png" href="https://raw.githubusercontent.com/ryvoxtb/image/refs/heads/main/icon/tv.png">
    <!-- CSS Link -->
    <link rel="stylesheet" href="style.css">
    <!-- HLS.js for stream playback -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
    <!-- Blueimp MD5 library for generating secure tokens -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
    <!-- Icons helper -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

<div class="player-wrapper" id="playerWrapper">
    <!-- মোবাইল টপ হেডার -->
    <div class="mobile-top-header" id="mobileTopHeader">
        <div class="header-logo-text">
            <i class="fa-solid fa-circle-play-badge animated-logo"></i> ABOX <span>BDIX</span>
        </div>
        <a href="../index.html" class="exit-btn">
            <i class="fa-solid fa-right-from-bracket"></i> বাহির
        </a>
    </div>

    <!-- ভিডিও এবং মোবাইল ফুলস্ক্রিন কন্টেইনার -->
    <div class="video-container">
        <video id="video" playsinline webkit-playsinline></video>
        
        <!-- লোডার -->
        <div class="loader-overlay" id="loaderOverlay">
            <div class="modern-loader">
                <div class="love-loader-hearts">
                    <i class="fa-solid fa-heart"></i>
                    <i class="fa-solid fa-heart"></i>
                    <i class="fa-solid fa-heart"></i>
                </div>
            </div>
        </div>

        <button class="mobile-mode-toggle-btn" id="mobileModeToggleBtn" title="Player Mode">
            <i class="fa-solid fa-compress" id="mobileModeToggleIcon"></i>
        </button>
    </div>

    <div class="error-overlay" id="errorOverlay">
        <div class="error-card">
            <button class="close-error-btn" id="closeErrorBtn">&times;</button>
            <i class="fa-solid fa-triangle-exclamation"></i>
            <div class="error-text">
                <h3>চ্যানেল লোড হচ্ছে না</h3>
                <p>সাময়িক সমস্যা, সাহায্যের জন্য যোগাযোগ করুন</p>
            </div>
            <a href="https://wa.me/8801872173839" target="_blank" class="wa-btn" id="waBtn">
                <i class="fab fa-whatsapp"></i> যোগাযোগ
            </a>
        </div>
    </div>

    <!-- সাইডবার / মোবাইল চ্যানেল গ্রিড -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-title"><i class="fa-solid fa-tv"></i> ABOX BDIX</div>
        
        <!-- নতুন চ্যানেল সার্চ বার -->
        <div class="search-box-container">
            <i class="fa fa-search search-icon"></i>
            <input type="text" id="channelSearch" placeholder="চ্যানেল খুঁজুন...">
        </div>
        
        <div class="channel-container" id="channelList"></div>
    </div>
    
    <div class="bottom-right-controls" id="controls">
        <i class="fa fa-volume-up"></i>
        <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
        <button class="mode-toggle-btn" id="modeToggleBtn" title="Player Mode">
            <i class="fa-solid fa-compress" id="modeToggleIcon"></i>
            <span id="modeToggleLabel">Normal</span>
        </button>
    </div>
</div>

<!-- JS Link -->
<script src="app.js"></script>
</body>
</html>

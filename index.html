<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOX BDIX - Secure Login</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="no-select">
    <!-- প্রিমিয়াম অ্যাপ ওপেনিং অ্যানিমেশন স্ক্রিন -->
    <div id="app-splash">
        <div class="splash-bg-glow"></div>
        <div class="splash-content">
            <h1 class="splash-title">
                <span class="letter-w">ABOX</span>
                <span class="letter-b">BDIX</span>
            </h1>
            <p class="splash-subtitle">PREMIUM STREAMING PLATFORM</p>
        </div>
    </div>

    <!-- মূল ওয়েবসাইট হেডার -->
    <header class="main-header">
        <div class="logo"><span class="white-text">ABOX</span> <span class="blue-text">BDIX</span></div>
        <div class="header-line"></div>
    </header>

    <div class="container">
        <!-- লগইন কার্ড -->
        <div id="login-card" class="card animate-card-in">
            <h2>LOGIN</h2>
            <p class="subtitle">Enter Your Mobile Number</p>
            
            <div class="input-group">
                <div class="icon-box">
                    <i class="fab fa-whatsapp"></i>
                </div>
                <!-- tabindex যুক্ত করা হয়েছে টিভি রিমোট নেভিগেশনের জন্য -->
                <input type="tel" id="whatsapp-number" placeholder="Whatsapp Number" autocomplete="off" tabindex="1">
            </div>

            <button id="login-btn" class="btn" tabindex="2">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>

            <p class="footer-text">For any help, contact: <span class="blue-text">01872-173839</span></p>
        </div>

        <!-- ওটিপি কার্ড -->
        <div id="otp-card" class="card hidden">
            <h2>OTP</h2>
            <p class="subtitle">Enter OTP</p>
            
            <!-- ওটিপি বক্স (কিবোর্ড প্রোটেকশন সহ Readonly) -->
            <div class="otp-container">
                <input type="text" class="otp-input" maxlength="1" readonly tabindex="-1">
                <input type="text" class="otp-input" maxlength="1" readonly tabindex="-1">
                <input type="text" class="otp-input" maxlength="1" readonly tabindex="-1">
                <input type="text" class="otp-input" maxlength="1" readonly tabindex="-1">
            </div>

            <p class="resend-text">Resend OTP</p>

            <p class="footer-text">For any help, contact: <span class="blue-text">01872-173839</span></p>
        </div>
    </div>

    <!-- কাস্টম সিকিউরিটি ও মেসেজ অ্যালার্ট মডাল (টিভি ফ্রেন্ডলি) -->
    <div id="custom-alert" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <h3 id="alert-title">Security Message</h3>
            <p id="alert-message">Message details go here.</p>
            <button id="alert-ok-btn" class="btn modal-btn" tabindex="3">OK</button>
        </div>
    </div>

    <!-- ফায়ারবেস এবং মেইন লজিক স্ক্রিপ্ট ফাইল সংযোগ -->
    <script type="module" src="js-script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABOX BDIX</title>
    
    <!-- গুগল অ্যাডসেন্স কোড -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7495485639784976"
     crossorigin="anonymous"></script>
     
    <link rel="icon" type="image/png" href="https://i.postimg.cc/9MC7gjnS/photo-6244344933686906547-y-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome আইকন প্যাক -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS লিঙ্কটি এখন সরাসরি দেওয়া হয়েছে -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <div class="logo-container">
            <img src="https://i.postimg.cc/9MC7gjnS/photo-6244344933686906547-y-removebg-preview.png" alt="ABOX BDIX Logo" class="header-logo-img">
            <span class="brand-name"><span class="brand-white">ABOX</span> <span class="brand-blue">BDIX</span></span>
        </div>
        <div class="clock" id="clock">00:00:00 PM</div>
        <!-- User Profile -->
        <div class="user-icon focusable" tabindex="0" data-url="Li4vcHJvZmlsZS9wcm9maWxlLmh0bWw=">
            <i class="fa-solid fa-user-astronaut"></i>
        </div>
    </header>

    <main class="main-content">
        <div class="cards-container">
            <!-- ABOX BDIX Main Card -->
            <div class="card card-main focusable" tabindex="0" data-url="Li4vdHYvaXB0di5odG1s">
                <div class="icon-wrapper">
                    <img src="https://i.postimg.cc/9MC7gjnS/photo-6244344933686906547-y-removebg-preview.png" alt="ABOX BDIX" class="card-logo-img main-logo-glow">
                </div>
                <h2>ABOX BDIX</h2>
            </div>

            <!-- Movies Card -->
            <div class="card card-sub focusable" tabindex="0" data-url="Li4vbW92ZS9tb3ZlLmh0bWw=">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-film card-icon"></i>
                </div>
                <h2>Movies</h2>
            </div>

            <!-- Sports Card -->
            <div class="card card-sub focusable" tabindex="0" data-url="Li4vc3BvcnRzL3Nwb3J0cy5odG1s">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-circle-play card-icon"></i>
                </div>
                <h2>Sports</h2>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <div class="bottom-buttons">
            <!-- APK DOWNLOAD Button -->
            <button class="action-btn focusable" tabindex="0" data-url="Li4vZG93bmxvYWRzL2Fway5odG1s">
                <i class="fa-brands fa-android btn-icon-style"></i>
                <span>APK DOWNLOAD</span>
            </button>

            <!-- WHATSAPP Button -->
            <button class="action-btn focusable" tabindex="0" data-url="Li4vY29udGFjdC93aGF0c2FwcC5odG1s">
                <i class="fa-brands fa-whatsapp btn-icon-style"></i>
                <span>WHATSAPP</span>
            </button>

            <!-- DOYMOND Button -->
            <button class="action-btn focusable" tabindex="0" data-url="Li4vZG95bW9uZC9kb3ltb25kLmh0bWw=">
                <i class="fa-solid fa-gem btn-icon-style"></i>
                <span>DOYMOND</span>
            </button>
        </div>
    </footer>

    <!-- JS লিঙ্কটি এখন সরাসরি দেওয়া হয়েছে -->
    <script src="script.js"></script>
</body>
</html>
